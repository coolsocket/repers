name: RePERS Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run race-safe local gate
        run: python .repers\scripts\repers.py verify-all --json
